name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install

      - name: Validate Apple certificate secret (macOS only)
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "${APPLE_CERTIFICATE}" ]; then
            echo "APPLE_CERTIFICATE secret is empty."
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/apple_cert.p12"
          if base64 --help >/dev/null 2>&1; then
            printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH" || {
              echo "APPLE_CERTIFICATE is not valid base64."
              exit 1
            }
          else
            printf '%s' "$APPLE_CERTIFICATE" | base64 -D > "$CERT_PATH" || {
              echo "APPLE_CERTIFICATE is not valid base64."
              exit 1
            }
          fi

          [ -s "$CERT_PATH" ] || {
            echo "APPLE_CERTIFICATE is not valid base64."
            exit 1
          }

          openssl pkcs12 -in "$CERT_PATH" -nokeys -passin "pass:${APPLE_CERTIFICATE_PASSWORD}" >/dev/null 2>&1 || {
            echo "APPLE_CERTIFICATE_PASSWORD is invalid or certificate is not a valid .p12 with expected password."
            exit 1
          }

      - name: Build frontend
        run: pnpm run build

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: --target ${{ matrix.target }}
          tagName: v__VERSION__
          releaseName: 'Glance v__VERSION__'
          releaseBody: 'See the attached assets to download and install Glance.'
          releaseDraft: true
          prerelease: false
