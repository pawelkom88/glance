name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths-ignore:
      - 'landing-page/**'
  pull_request:
    paths-ignore:
      - 'landing-page/**'
  workflow_dispatch:

jobs:
  behavior-critical-macos:
    if: "!contains(github.event.head_commit.message, '[skip gha]')"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Run critical frontend behavior tests
        run: pnpm exec vitest run --config vitest.behavior.config.ts src/test/behavior/critical

      - name: Ensure frontendDist exists for Rust compile
        run: 'node -e "require(''fs'').mkdirSync(''dist'', { recursive: true })"'

      - name: Run runtime contract tests (retry once)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 2
          command: cargo test --manifest-path src-tauri/Cargo.toml runtime_

  behavior-critical-windows:
    if: "!contains(github.event.head_commit.message, '[skip gha]')"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Run critical frontend behavior tests
        run: pnpm exec vitest run --config vitest.behavior.config.ts src/test/behavior/critical

      - name: Ensure frontendDist exists for Rust compile
        run: 'node -e "require(''fs'').mkdirSync(''dist'', { recursive: true })"'

      - name: Run runtime contract tests (retry once)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 2
          command: cargo test --manifest-path src-tauri/Cargo.toml runtime_

  rust-tests:
    if: "!contains(github.event.head_commit.message, '[skip gha]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies (Tauri)
        shell: bash
        run: |
          sudo apt-get update
          WEBKIT_PKG="libwebkit2gtk-4.1-dev"
          if ! apt-cache show "$WEBKIT_PKG" >/dev/null 2>&1; then
            WEBKIT_PKG="libwebkit2gtk-4.0-dev"
          fi
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            "$WEBKIT_PKG" \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Ensure frontendDist exists for Rust compile
        run: mkdir -p dist

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  build:
    if: "(github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && !contains(github.event_head_commit.message, '[skip gha]')"
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg,app
          - os: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg,app
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm run build

      - name: Build Tauri (non-Windows)
        if: runner.os != 'Windows'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        with:
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          tagName: v__VERSION__
          releaseName: 'Glance v__VERSION__'
          releaseBody: 'See the attached assets to download and install Glance.'
          releaseDraft: false
          prerelease: false

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          if-no-files-found: warn

      - name: Build Tauri (Windows first attempt)
        if: runner.os == 'Windows'
        id: tauri_windows_attempt_1
        continue-on-error: true
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          tagName: v__VERSION__
          releaseName: 'Glance v__VERSION__'
          releaseBody: 'See the attached assets to download and install Glance.'
          releaseDraft: false
          prerelease: false

      - name: Build Tauri (Windows retry)
        if: runner.os == 'Windows' && steps.tauri_windows_attempt_1.outcome == 'failure'
        id: tauri_windows_attempt_2
        continue-on-error: true
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          tagName: v__VERSION__
          releaseName: 'Glance v__VERSION__'
          releaseBody: 'See the attached assets to download and install Glance.'
          releaseDraft: false
          prerelease: false

      - name: Build Tauri (Windows final retry)
        if: runner.os == 'Windows' && steps.tauri_windows_attempt_2.outcome == 'failure'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          tagName: v__VERSION__
          releaseName: 'Glance v__VERSION__'
          releaseBody: 'See the attached assets to download and install Glance.'
          releaseDraft: false
          prerelease: false

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: warn
