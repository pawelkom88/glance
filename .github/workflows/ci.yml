name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg,app
          - os: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg,app
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm run build

      - name: Build Tauri (non-Windows)
        if: runner.os != 'Windows'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          tagName: v__VERSION__
          releaseName: 'Glance v__VERSION__'
          releaseBody: 'See the attached assets to download and install Glance.'
          releaseDraft: true
          prerelease: false

      - name: Build Tauri (Windows first attempt)
        if: runner.os == 'Windows'
        id: tauri_windows_attempt_1
        continue-on-error: true
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          tagName: v__VERSION__
          releaseName: 'Glance v__VERSION__'
          releaseBody: 'See the attached assets to download and install Glance.'
          releaseDraft: true
          prerelease: false

      - name: Build Tauri (Windows retry)
        if: runner.os == 'Windows' && steps.tauri_windows_attempt_1.outcome == 'failure'
        id: tauri_windows_attempt_2
        continue-on-error: true
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          tagName: v__VERSION__
          releaseName: 'Glance v__VERSION__'
          releaseBody: 'See the attached assets to download and install Glance.'
          releaseDraft: true
          prerelease: false

      - name: Build Tauri (Windows final retry)
        if: runner.os == 'Windows' && steps.tauri_windows_attempt_2.outcome == 'failure'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          tagName: v__VERSION__
          releaseName: 'Glance v__VERSION__'
          releaseBody: 'See the attached assets to download and install Glance.'
          releaseDraft: true
          prerelease: false
